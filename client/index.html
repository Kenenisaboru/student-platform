<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#060a14" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Arsi Aseko University Student Platform</title>
    <meta name="description" content="The official communication platform for Arsi Aseko University students. Connect, collaborate, and stay updated with campus events." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://arsi-aseko-portal.edu.et/" />
    <meta property="og:title" content="Arsi Aseko University Student Platform" />
    <meta property="og:description" content="Connect, collaborate, and stay updated with campus events on the official student portal." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1541339907198-e08759dfc3ef?auto=format&fit=crop&w=1200&q=80" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://arsi-aseko-portal.edu.et/" />
    <meta property="twitter:title" content="Arsi Aseko University Student Platform" />
    <meta property="twitter:description" content="Connect, collaborate, and stay updated with campus events on the official student portal." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1541339907198-e08759dfc3ef?auto=format&fit=crop&w=1200&q=80" />
    
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme');
          const supportDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches === true;
          if (theme === 'dark' || (!theme && supportDarkMode)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          console.error('Theme initialization failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
